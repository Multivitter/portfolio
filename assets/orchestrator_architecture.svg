<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-size: 15px; font-weight: 700; fill: #e2e8f0; }
      .label { font-size: 13px; font-weight: 600; fill: #e2e8f0; }
      .sub   { font-size: 11px; fill: #94a3b8; }
      .arr   { stroke: #64748b; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect width="760" height="560" fill="#0e1117"/>

  <text class="title" x="36" y="28">Источники</text>
  <g>
    <rect x="36" y="42" width="130" height="42" rx="9" fill="#1e293b" stroke="#334155"/>
    <text class="label" x="101" y="62" text-anchor="middle">Amazon</text>
    <text class="sub"   x="101" y="77" text-anchor="middle">SP-API · Ads</text>
  </g>
  <g>
    <rect x="36" y="94" width="130" height="42" rx="9" fill="#1e293b" stroke="#334155"/>
    <text class="label" x="101" y="114" text-anchor="middle">Walmart</text>
    <text class="sub"   x="101" y="129" text-anchor="middle">orders · WFS</text>
  </g>
  <g>
    <rect x="36" y="146" width="130" height="42" rx="9" fill="#1e293b" stroke="#334155"/>
    <text class="label" x="101" y="166" text-anchor="middle">Shopify</text>
    <text class="sub"   x="101" y="181" text-anchor="middle">P&amp;L · stock</text>
  </g>
  <g>
    <rect x="36" y="198" width="130" height="42" rx="9" fill="#1e293b" stroke="#334155"/>
    <text class="label" x="101" y="218" text-anchor="middle">Weather</text>
    <text class="sub"   x="101" y="233" text-anchor="middle">Open-Meteo</text>
  </g>

  <line x1="166" y1="63"  x2="280" y2="128" class="arr" marker-end="url(#arrow)"/>
  <line x1="166" y1="115" x2="280" y2="134" class="arr" marker-end="url(#arrow)"/>
  <line x1="166" y1="167" x2="280" y2="142" class="arr" marker-end="url(#arrow)"/>
  <line x1="166" y1="219" x2="280" y2="150" class="arr" marker-end="url(#arrow)"/>

  <rect x="282" y="64" width="186" height="170" rx="15" fill="#1a1530" stroke="#4c1d95"/>
  <text class="title" x="375" y="90"  text-anchor="middle">Оркестратор</text>
  <text class="sub"   x="375" y="107" text-anchor="middle">один процесс · 24/7</text>
  <rect x="300" y="122" width="150" height="34" rx="8" fill="#0f2922" stroke="#0f6e56"/>
  <text class="sub" x="375" y="143" text-anchor="middle">~50 задач по графику</text>
  <rect x="300" y="162" width="150" height="34" rx="8" fill="#0f2922" stroke="#0f6e56"/>
  <text class="sub" x="375" y="183" text-anchor="middle">auto-retry · анти-дабл</text>
  <rect x="300" y="202" width="150" height="22" rx="6" fill="#0f2922" stroke="#0f6e56"/>
  <text class="sub" x="375" y="217" text-anchor="middle">пул воркеров</text>

  <line x1="468" y1="150" x2="582" y2="150" class="arr" marker-end="url(#arrow)"/>

  <rect x="584" y="118" width="140" height="64" rx="11" fill="#0f2818" stroke="#16a34a"/>
  <text class="label" x="654" y="144" text-anchor="middle">PostgreSQL</text>
  <text class="sub"   x="654" y="162" text-anchor="middle">единое хранилище</text>

  <text class="title" x="36" y="300">Фоновые мониторы</text>
  <rect x="36" y="314" width="688" height="84" rx="13" fill="#2a2410" stroke="#a16207"/>
  <text class="sub" x="60" y="342">Следят за таблицами: изменилась дата или счётчик строк → разбор события</text>
  <text class="sub" x="60" y="364">order confirm · AWD shipments · transactions · fulfilled shipments · support</text>
  <text class="sub" x="60" y="386">+ ежедневная сводка по всем загрузчикам (runs · rows · errors)</text>

  <line x1="654" y1="182" x2="654" y2="314" class="arr" marker-end="url(#arrow)"/>
  <line x1="380" y1="398" x2="380" y2="446" class="arr" marker-end="url(#arrow)"/>

  <rect x="256" y="448" width="248" height="60" rx="11" fill="#2a1418" stroke="#be123c"/>
  <text class="label" x="380" y="474" text-anchor="middle">Telegram-алерты</text>
  <text class="sub"   x="380" y="493" text-anchor="middle">сводки · ошибки · события в реальном времени</text>

  <text class="sub" x="380" y="540" text-anchor="middle" fill="#64748b">Все данные обезличены · реальная конфигурация под NDA</text>
</svg>
